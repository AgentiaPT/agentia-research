name: Secret & PII Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full repo scan — Sundays at 06:00 UTC
    - cron: '0 6 * * 0'

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: Gitleaks (secrets + PII)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: bash scripts/install-gitleaks.sh
        env:
          INSTALL_DIR: /usr/local/bin

      - name: Run Gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml --redact --verbose

  trufflehog:
    name: TruffleHog (deep scan + verification)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@v3.93.8
        with:
          extra_args: --only-verified --results=verified,unknown

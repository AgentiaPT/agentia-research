<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>agentIA Research — AI-Powered Research & Experiments</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%233B82F6'/%3E%3Cstop offset='100%25' stop-color='%238B5CF6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='%230A0F1C'/%3E%3Ccircle cx='32' cy='26' r='12' fill='none' stroke='url(%23g)' stroke-width='3'/%3E%3Ccircle cx='32' cy='26' r='4' fill='url(%23g)'/%3E%3Cpath d='M20 46 Q32 38 44 46' fill='none' stroke='url(%23g)' stroke-width='3' stroke-linecap='round'/%3E%3Ccircle cx='20' cy='46' r='3' fill='url(%23g)'/%3E%3Ccircle cx='44' cy='46' r='3' fill='url(%23g)'/%3E%3Ccircle cx='32' cy='54' r='3' fill='url(%23g)'/%3E%3Cpath d='M20 46 L32 54 L44 46' fill='none' stroke='url(%23g)' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E">
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  /* agentIA Brand Kit */
  --bg: #0A0F1C;
  --card: #0F1629;
  --border: #1a2040;
  --text: #E0E7FF;
  --muted: #8892B0;
  --accent: #3B82F6;
  --green: #34D399;
  --red: #EF4444;
  --amber: #F59E0B;
  --purple: #8B5CF6;
  --cyan: #06B6D4;
  --sidebar-w: 260px;
  --header-h: 56px;
}

html, body {
  overflow-x: hidden;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ── */
.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 200;
  height: var(--header-h);
  background: rgba(10, 15, 28, 0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 1.5rem;
  max-width: 100vw;
}

.ai-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  font-size: 0.65rem;
  font-weight: 600;
  color: var(--amber);
  background: rgba(245, 158, 11, 0.08);
  border: 1px solid rgba(245, 158, 11, 0.2);
  border-radius: 999px;
  padding: 0.15rem 0.55rem;
  white-space: nowrap;
  text-decoration: none;
  transition: background 0.2s;
}

.ai-badge:hover {
  background: rgba(245, 158, 11, 0.15);
}

.ai-badge svg {
  width: 11px;
  height: 11px;
  flex-shrink: 0;
}

.header-brand {
  display: flex;
  align-items: baseline;
  gap: 0.5rem;
  text-decoration: none;
  color: inherit;
}

.header-brand h1 {
  font-family: 'Sora', system-ui, sans-serif;
  font-size: 1.25rem;
  font-weight: 800;
  letter-spacing: -0.02em;
}

.header-brand h1 .agent {
  color: var(--text);
}

.header-brand h1 .ia {
  color: var(--accent);
}

.header-brand .research-label {
  font-family: 'Sora', system-ui, sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.02em;
}

.header-tagline {
  font-size: 0.78rem;
  color: var(--muted);
  font-weight: 500;
  margin-left: 0.75rem;
}

.header-links {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.header-links a {
  color: var(--muted);
  text-decoration: none;
  font-size: 0.82rem;
  transition: color 0.2s;
}

.header-links a:hover {
  color: var(--accent);
}

.header-links a svg {
  width: 20px;
  height: 20px;
  vertical-align: middle;
}

/* ── Layout ── */
.layout {
  display: flex;
  margin-top: var(--header-h);
  min-height: calc(100vh - var(--header-h));
}

/* ── Sidebar ── */
.sidebar {
  position: fixed;
  top: var(--header-h);
  left: 0;
  bottom: 0;
  width: var(--sidebar-w);
  background: linear-gradient(180deg, #0F1629 0%, #0A0F1C 100%);
  border-right: 1px solid var(--border);
  padding: 1.25rem 1rem;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
  z-index: 100;
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}

.sidebar-section h3 {
  font-family: 'Sora', system-ui, sans-serif;
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  margin-bottom: 0.6rem;
}

/* Search */
.search-wrap {
  position: relative;
}

.search-wrap svg {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  width: 15px;
  height: 15px;
  color: var(--muted);
  pointer-events: none;
}

.search-input {
  width: 100%;
  padding: 0.55rem 0.75rem 0.55rem 2.2rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
  color: var(--text);
  font-size: 0.85rem;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}

.search-input::placeholder {
  color: var(--muted);
}

.search-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
}

/* Filter chips in sidebar */
.chip-group {
  display: flex;
  flex-wrap: wrap;
  gap: 0.35rem;
}

.chip {
  display: inline-flex;
  align-items: center;
  padding: 0.2rem 0.6rem;
  border-radius: 999px;
  font-size: 0.72rem;
  font-weight: 500;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
  user-select: none;
}

.chip:hover {
  border-color: var(--accent);
  color: var(--text);
}

.chip.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

.chip.status-complete.active { background: var(--green); border-color: var(--green); color: #0A0F1C; }
.chip.status-ongoing.active  { background: var(--amber); border-color: var(--amber); color: #0A0F1C; }
.chip.status-draft.active    { background: var(--purple); border-color: var(--purple); color: #fff; }

.sidebar-stats {
  font-size: 0.78rem;
  color: var(--muted);
  padding-top: 0.25rem;
  border-top: 1px solid var(--border);
  margin-top: auto;
}

.sidebar-stats span {
  color: var(--text);
  font-weight: 600;
}

/* ── Main content ── */
.main {
  flex: 1;
  margin-left: var(--sidebar-w);
  display: flex;
  flex-direction: column;
  min-height: calc(100vh - var(--header-h));
}

.count-bar {
  padding: 1rem 1.5rem 0;
  font-size: 0.82rem;
  color: var(--muted);
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 1.1rem;
  padding: 1rem 1.5rem 2rem;
  flex: 1;
}

/* ── Card ── */
.card {
  position: relative;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.35rem;
  display: flex;
  flex-direction: column;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  transition: transform 0.2s, border-color 0.25s, box-shadow 0.25s;
  opacity: 0;
  animation: cardIn 0.4s ease forwards;
}

.card:hover {
  transform: translateY(-3px);
  border-color: var(--accent);
  box-shadow: 0 8px 30px rgba(59, 130, 246, 0.08);
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card .status-badge {
  position: absolute;
  top: 1rem;
  right: 1rem;
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 0.18rem 0.5rem;
  border-radius: 6px;
}

.status-complete .status-badge { background: rgba(52,211,153,0.12); color: var(--green); }
.status-ongoing  .status-badge { background: rgba(245,158,11,0.12); color: var(--amber); }
.status-draft    .status-badge { background: rgba(139,92,246,0.12); color: var(--purple); }
.status-unknown  .status-badge { background: rgba(136,146,176,0.12); color: var(--muted); }

.card h3 {
  font-family: 'Sora', system-ui, sans-serif;
  font-size: 1.05rem;
  font-weight: 700;
  margin-bottom: 0.3rem;
  padding-right: 4.5rem;
  line-height: 1.35;
  color: var(--text);
}

.card .date {
  font-size: 0.75rem;
  color: var(--muted);
  margin-bottom: 0.5rem;
}

.card .meta-row {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  font-size: 0.72rem;
  color: var(--muted);
  margin-bottom: 0.5rem;
}

.card .meta-row span {
  display: inline-flex;
  align-items: center;
  gap: 0.25rem;
}

.card .meta-row svg {
  width: 12px;
  height: 12px;
  opacity: 0.7;
}

.card .desc {
  font-size: 0.85rem;
  color: var(--muted);
  flex: 1;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 0.75rem;
  line-height: 1.55;
}

.card .card-footer {
  display: flex;
  flex-wrap: wrap;
  gap: 0.3rem;
  align-items: center;
}

.card .tag {
  font-size: 0.68rem;
  padding: 0.12rem 0.45rem;
  border-radius: 999px;
  background: rgba(59, 130, 246, 0.08);
  color: var(--accent);
  font-weight: 500;
}

.card .interactive-badge {
  font-size: 0.66rem;
  padding: 0.15rem 0.45rem;
  border-radius: 999px;
  background: rgba(139, 92, 246, 0.12);
  color: var(--purple);
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  gap: 0.25rem;
  text-decoration: none;
  transition: background 0.2s;
}

.card .interactive-badge:hover {
  background: rgba(139, 92, 246, 0.25);
}

.card .interactive-badge svg {
  width: 11px;
  height: 11px;
}

/* ── Empty state ── */
.empty {
  grid-column: 1 / -1;
  text-align: center;
  padding: 4rem 1rem;
  color: var(--muted);
}

.empty h3 {
  font-family: 'Sora', system-ui, sans-serif;
  font-size: 1.2rem;
  margin-bottom: 0.5rem;
  color: var(--text);
}

/* ── Error state ── */
.error-msg {
  max-width: 600px;
  margin: 3rem auto;
  padding: 2rem;
  text-align: center;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--muted);
}

.error-msg h3 {
  font-family: 'Sora', system-ui, sans-serif;
  color: var(--amber);
  margin-bottom: 0.75rem;
}

.error-msg code {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg);
  padding: 0.5rem 1rem;
  border-radius: 8px;
  margin-top: 0.75rem;
  font-size: 0.85rem;
  color: var(--accent);
}

/* ── Footer ── */
footer {
  text-align: center;
  padding: 2rem 1.5rem;
  border-top: 1px solid var(--border);
  color: var(--muted);
  font-size: 0.8rem;
  line-height: 1.7;
  margin-left: var(--sidebar-w);
}

footer a {
  color: var(--accent);
  text-decoration: none;
}

footer a:hover {
  text-decoration: underline;
}

/* ── Mobile sidebar toggle ── */
.sidebar-toggle {
  display: none;
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  padding: 0.25rem;
}

.sidebar-toggle svg {
  width: 22px;
  height: 22px;
}

.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 90;
}

/* ── Responsive ── */
@media (max-width: 800px) {
  .sidebar-toggle {
    display: block;
  }

  .header-tagline {
    display: none;
  }

  .ai-badge .ai-badge-text {
    display: none;
  }

  .sidebar {
    transform: translateX(-100%);
    transition: transform 0.3s ease;
    z-index: 150;
  }

  .sidebar.open {
    transform: translateX(0);
  }

  .sidebar-overlay.open {
    display: block;
  }

  .main {
    margin-left: 0;
  }

  footer {
    margin-left: 0;
  }

  .grid {
    grid-template-columns: 1fr;
    padding: 0.75rem 1rem 2rem;
  }

  .count-bar {
    padding: 0.75rem 1rem 0;
  }

  .header {
    padding: 0 0.75rem;
  }

  .card {
    padding: 1rem;
  }

  .card h3 {
    font-size: 0.95rem;
    padding-right: 3.5rem;
  }
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div style="display:flex;align-items:center;gap:1rem;">
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle filters">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg>
    </button>
    <a href="/" class="header-brand">
      <h1><span class="agent">agent</span><span class="ia">IA</span></h1>
      <span class="research-label">Research</span>
    </a>
    <span class="header-tagline">AI-Powered Research &amp; Experiments</span>
  </div>
  <div class="header-links">
    <a href="https://docs.anthropic.com/en/docs/claude-code" target="_blank" rel="noopener" class="ai-badge" title="All content authored by Claude Code (AI) with human direction — verify independently">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.455 2.456L21.75 6l-1.036.259a3.375 3.375 0 00-2.455 2.456z"/></svg>
      <span class="ai-badge-text">AI-authored content</span>
    </a>
    <a href="https://github.com/AgentiaPT/agentia-research" target="_blank" rel="noopener" title="GitHub">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
    </a>
  </div>
</header>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <h3>Search</h3>
      <div class="search-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/></svg>
        <input type="text" class="search-input" id="searchInput" placeholder="Search projects..." autocomplete="off" />
      </div>
    </div>

    <div class="sidebar-section" id="statusSection" style="display:none;">
      <h3>Status</h3>
      <div class="chip-group" id="statusChips"></div>
    </div>

    <div class="sidebar-section" id="tagSection" style="display:none;">
      <h3>Tags</h3>
      <div class="chip-group" id="tagChips"></div>
    </div>

    <div class="sidebar-stats" id="sidebarStats"></div>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Main -->
  <main class="main">
    <div class="count-bar" id="countBar"></div>
    <div class="grid" id="grid"></div>
  </main>
</div>

<footer>
  Built by <strong>agentIA</strong> &mdash; AI training &amp; consulting from Porto, Portugal.<br>
  <a href="https://github.com/AgentiaPT/agentia-research" target="_blank" rel="noopener">github.com/AgentiaPT/agentia-research</a>
</footer>

<script>
(function() {
  const grid = document.getElementById('grid');
  const countBar = document.getElementById('countBar');
  const statusChips = document.getElementById('statusChips');
  const tagChips = document.getElementById('tagChips');
  const statusSection = document.getElementById('statusSection');
  const tagSection = document.getElementById('tagSection');
  const searchInput = document.getElementById('searchInput');
  const sidebarStats = document.getElementById('sidebarStats');
  const sidebar = document.getElementById('sidebar');
  const sidebarToggle = document.getElementById('sidebarToggle');
  const sidebarOverlay = document.getElementById('sidebarOverlay');

  let projects = [];
  let activeTags = new Set();
  let activeStatuses = new Set();

  const STATUS_LABELS = { complete: 'complete', ongoing: 'ongoing', draft: 'draft' };
  const STATUS_ORDER = ['complete', 'ongoing', 'draft'];

  // Mobile sidebar toggle
  sidebarToggle.addEventListener('click', () => {
    sidebar.classList.toggle('open');
    sidebarOverlay.classList.toggle('open');
  });
  sidebarOverlay.addEventListener('click', () => {
    sidebar.classList.remove('open');
    sidebarOverlay.classList.remove('open');
  });

  function normalizeStatus(s) {
    if (!s) return 'unknown';
    const l = s.toLowerCase().trim();
    if (STATUS_LABELS[l]) return l;
    return 'unknown';
  }

  function cleanDesc(d) {
    if (!d) return '';
    return d.replace(/\*\*(.+?)\*\*/g, '$1').replace(/\*(.+?)\*/g, '$1').replace(/_(.+?)_/g, '$1');
  }

  function formatDate(d) {
    if (!d) return '';
    const dt = new Date(d + 'T00:00:00');
    return dt.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
  }

  function renderFilters() {
    const tagCounts = {};
    projects.forEach(p => (p.tags || []).forEach(t => { tagCounts[t] = (tagCounts[t] || 0) + 1; }));
    const sortedTags = Object.keys(tagCounts).sort((a, b) => tagCounts[b] - tagCounts[a]);

    const statusSet = new Set();
    projects.forEach(p => { const s = normalizeStatus(p.status); if (s !== 'unknown') statusSet.add(s); });

    if (statusSet.size > 0) {
      statusSection.style.display = '';
      statusChips.innerHTML = STATUS_ORDER
        .filter(s => statusSet.has(s))
        .map(s => `<button class="chip status-${s}" data-status="${s}">${s}</button>`)
        .join('');
    }

    if (sortedTags.length > 0) {
      tagSection.style.display = '';
      tagChips.innerHTML = sortedTags
        .map(t => `<button class="chip tag-chip" data-tag="${t}">${t}</button>`)
        .join('');
    }

    sidebarStats.innerHTML = `<span>${projects.length}</span> project${projects.length !== 1 ? 's' : ''} total`;

    statusChips.querySelectorAll('[data-status]').forEach(btn => {
      btn.addEventListener('click', () => {
        const s = btn.dataset.status;
        if (activeStatuses.has(s)) { activeStatuses.delete(s); btn.classList.remove('active'); }
        else { activeStatuses.add(s); btn.classList.add('active'); }
        renderCards();
      });
    });

    tagChips.querySelectorAll('[data-tag]').forEach(btn => {
      btn.addEventListener('click', () => {
        const t = btn.dataset.tag;
        if (activeTags.has(t)) { activeTags.delete(t); btn.classList.remove('active'); }
        else { activeTags.add(t); btn.classList.add('active'); }
        renderCards();
      });
    });
  }

  function getFiltered() {
    const q = searchInput.value.toLowerCase().trim();
    return projects.filter(p => {
      if (q) {
        const haystack = [p.title || '', cleanDesc(p.description), ...(p.tags || [])].join(' ').toLowerCase();
        if (!haystack.includes(q)) return false;
      }
      if (activeTags.size > 0) {
        const pTags = new Set(p.tags || []);
        for (const t of activeTags) { if (!pTags.has(t)) return false; }
      }
      if (activeStatuses.size > 0) {
        if (!activeStatuses.has(normalizeStatus(p.status))) return false;
      }
      return true;
    });
  }

  function renderCards() {
    const filtered = getFiltered();
    countBar.textContent = `Showing ${filtered.length} of ${projects.length} project${projects.length !== 1 ? 's' : ''}`;

    if (filtered.length === 0) {
      grid.innerHTML = `<div class="empty"><h3>No projects found</h3><p>Try adjusting your search or filters.</p></div>`;
      return;
    }

    grid.innerHTML = filtered.map((p, i) => {
      const status = normalizeStatus(p.status);
      const statusLabel = status === 'unknown' ? '' : status;
      const desc = cleanDesc(p.description);
      const hasHtml = p.htmlFiles && p.htmlFiles.length > 0;
      const tags = (p.tags || []).map(t => `<span class="tag">${escHtml(t)}</span>`).join('');
      const interactiveBadges = hasHtml
        ? p.htmlFiles.map(f => {
            const label = f.replace('.html', '').replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
            return `<a href="${p.path}/${f}" class="interactive-badge" onclick="event.stopPropagation()" title="Open live demo"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.348a1.125 1.125 0 010 1.971l-11.54 6.347a1.125 1.125 0 01-1.667-.986V5.653z"/></svg>${escHtml(label)}</a>`;
          }).join('')
        : '';

      const wc = p.wordCount || 0;
      const rt = p.readingTime || 0;
      const wordLabel = wc >= 1000 ? (wc / 1000).toFixed(1).replace(/\.0$/, '') + 'k' : wc;
      const metaRow = wc > 0 ? `<div class="meta-row"><span><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>${wordLabel} words</span><span><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>${rt} min read</span></div>` : '';

      const repoBase = 'https://github.com/AgentiaPT/agentia-research/tree/main/';
      return `<a class="card status-${status}" href="${repoBase}${p.path || ('projects/' + p.id)}" style="animation-delay:${i * 0.05}s">
        ${statusLabel ? `<span class="status-badge">${statusLabel}</span>` : ''}
        <h3>${escHtml(p.title || p.id)}</h3>
        <span class="date">${formatDate(p.date)}</span>
        ${metaRow}
        <p class="desc">${escHtml(desc)}</p>
        <div class="card-footer">${tags}${interactiveBadges}</div>
      </a>`;
    }).join('');
  }

  function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function showError() {
    grid.innerHTML = '';
    countBar.textContent = '';
    const msg = document.createElement('div');
    msg.className = 'error-msg';
    msg.innerHTML = `<h3>Could not load project data</h3>
      <p>This page needs to fetch <strong>projects/index.json</strong> but the request failed.
      This usually happens when opening the file directly (file:// protocol).</p>
      <p>Try using a local server instead:</p>
      <code>npx serve .</code>
      <p style="margin-top:1rem;">Or visit the <a href="https://github.com/AgentiaPT/agentia-research" target="_blank">deployed site</a>.</p>`;
    grid.parentNode.insertBefore(msg, grid);
  }

  // Load data
  fetch('projects/index.json?v=' + Date.now())
    .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(data => {
      projects = (data.projects || []).sort((a, b) => {
        return (a.id || '').localeCompare(b.id || '');
      });
      renderFilters();
      renderCards();
    })
    .catch(() => showError());

  searchInput.addEventListener('input', renderCards);
})();
</script>
</body>
</html>
